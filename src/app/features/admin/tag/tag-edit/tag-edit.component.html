<!-- ── Header ─────────────────────────────────────── -->
<div class="al-header">
  <div class="al-header-left">
    <div class="al-icon-badge">
      <mat-icon>label</mat-icon>
    </div>
    <div>
      <h2 class="al-title">{{ 'TAGS.EDIT_TITLE' | translate }}</h2>
      <p class="al-subtitle">Etiket adını düzenleyin.</p>
    </div>
  </div>
</div>

<!-- ── Form Card ──────────────────────────────────── -->
<div class="al-form-wrap">
  <mat-progress-bar *ngIf="loading" mode="indeterminate" class="al-progress-top"></mat-progress-bar>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="al-field-row">
      <mat-form-field appearance="outline" class="al-field">
        <mat-label>{{ 'TAGS.NAME' | translate }}</mat-label>
        <mat-icon matPrefix>label_outline</mat-icon>
        <input matInput formControlName="name" [placeholder]="'TAGS.ENTER_NEW_NAME' | translate">
        <mat-error *ngIf="form.controls.name.hasError('required')">
          {{ 'VALIDATION.REQUIRED' | translate }}
        </mat-error>
        <mat-error *ngIf="form.controls.name.hasError('minlength')">En az 2 karakter olmalı.</mat-error>
        <mat-error *ngIf="form.controls.name.hasError('maxlength')">En fazla 64 karakter olabilir.</mat-error>
      </mat-form-field>
    </div>

    <div class="al-actions">
      <button class="al-btn-cancel" type="button" (click)="cancel()">
        <mat-icon>close</mat-icon>
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button class="al-btn-save" type="submit" [disabled]="loading || form.invalid">
        <mat-icon>save</mat-icon>
        {{ 'COMMON.SAVE' | translate }}
      </button>
    </div>
  </form>
</div>
