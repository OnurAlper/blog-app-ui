<!-- ─── HEADER ───────────────────────────────────────── -->
<div class="al-header">
  <h2 class="al-title">{{ 'NAV.CATEGORY' | translate }}</h2>
  <button class="al-create-btn" (click)="openCreate()">
    <mat-icon>add</mat-icon>
    {{ 'COMMON.CREATE' | translate }}
  </button>
</div>

<!-- ─── TOOLBAR ──────────────────────────────────────── -->
<div class="al-toolbar">
  <div class="al-search-wrap">
    <mat-icon class="al-search-icon">search</mat-icon>
    <input class="al-search-input"
           [ngModel]="searchTerm"
           (ngModelChange)="onSearchInput($event)"
           [placeholder]="'CATEGORIES.SEARCH_PLACEHOLDER' | translate">
  </div>
</div>

<!-- ─── LOADING ──────────────────────────────────────── -->
<div *ngIf="loading">
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
</div>

<!-- ─── TABLE ────────────────────────────────────────── -->
<div class="al-table-wrap" *ngIf="!loading">
  <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'COMMON.ID' | translate }}</th>
      <td mat-cell *matCellDef="let category" class="al-id-cell">{{ category.id }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'CATEGORIES.NAME' | translate }}</th>
      <td mat-cell *matCellDef="let category">
        <div class="al-name-cell">
          <div class="al-cat-icon"><mat-icon>category</mat-icon></div>
          <span class="al-cat-name">{{ category.name }}</span>
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="al-actions-th">{{ 'COMMON.ACTIONS' | translate }}</th>
      <td mat-cell *matCellDef="let category" class="al-actions-td">
        <button mat-icon-button class="al-btn-edit" (click)="openEdit(category)" [matTooltip]="'COMMON.EDIT' | translate">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button class="al-btn-delete" (click)="remove(category.id)" [matTooltip]="'COMMON.DELETE' | translate">
          <mat-icon>delete_outline</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <div *ngIf="!dataSource.data?.length" class="al-empty">
    <mat-icon>category</mat-icon>
    <p>{{ 'EMPTY.NO_RECORDS' | translate }}</p>
  </div>

  <mat-paginator
    [length]="totalCount" [pageSize]="pageSize" [pageIndex]="pageIndex"
    [pageSizeOptions]="[5, 10, 20, 50]" showFirstLastButtons (page)="onPageChange($event)">
  </mat-paginator>
</div>
